name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Change to "master" if your default branch uses it

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './Build' # This tells GitHub to only upload your compiled Ignite site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
