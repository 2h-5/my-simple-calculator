<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">

<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" type="text/css" href="style.css" />
  <link rel="icon" type="image/png" href="./src/FrameNo.png" />
</head>

<body>


  <nav class="navbar">
    <div class="nav-logo">🆉 Simple Calculator</div>
    <div class="nav-links">
        <div class="dropdown">
            <button class="nav-btn" id="theme-btn">Theme</button>
            <div class="dropdown-content" id="theme-dropdown">
                <button id="theme-dark">Dark</button>
                <button id="theme-light">Light</button>
            </div>
        </div>
        <button class="nav-btn" id="guide-btn">Guide</button>
      </div>
  </nav>


  <!-- The device wraps the calculator; the transparent frame is laid on top -->
  <div class="device">
    <div class="screen-area">
      <div class="calculator">

        <!-- Digit screen (seven-segment style) -->
        <div class="screen">
          <div class="display" id="display" aria-hidden="true">
            <div class="seg-line" id="segLine"></div>
          </div>
          <span class="sr-only" id="srDisplay" aria-live="polite">0</span>
        </div>

        <!-- Buttons -->
        <div class="keypad" id="keypad">

          <!-- Row 1 -->
          <button type="button" class="fn" data-action="clear" aria-label="All clear">AC</button>
          <button type="button" class="fn" data-action="delete" aria-label="Delete">DEL</button>
          <button type="button" class="fn" data-action="paren" aria-label="Bracket">()</button>
          <button type="button" class="op" data-op="/" aria-label="Divide">&#247;</button>

          <!-- Row 2 -->
          <button type="button" class="num" data-num="7">7</button>
          <button type="button" class="num" data-num="8">8</button>
          <button type="button" class="num" data-num="9">9</button>
          <button type="button" class="op" data-op="*" aria-label="Multiply">&#215;</button>

          <!-- Row 3 -->
          <button type="button" class="num" data-num="4">4</button>
          <button type="button" class="num" data-num="5">5</button>
          <button type="button" class="num" data-num="6">6</button>
          <button type="button" class="op" data-op="-" aria-label="Subtract">&#8722;</button>

          <!-- Row 4 -->
          <button type="button" class="num" data-num="1">1</button>
          <button type="button" class="num" data-num="2">2</button>
          <button type="button" class="num" data-num="3">3</button>
          <button type="button" class="op" data-op="+" aria-label="Add">+</button>

          <!-- Row 5 -->
          <button type="button" class="num" data-num="0">0</button>
          <button type="button" class="num" data-action="decimal" aria-label="Decimal point">.</button>
          <button type="button" class="num small-text" data-action="negate" aria-label="Toggle sign">+/−</button>
          <button type="button" class="eq" data-action="equals" aria-label="Equals">=</button>

        </div>
      </div>
    </div>

    <!-- Decorative phone frame on top (no interaction) -->
    <img class="frame" src="src/Frame.png" alt="" aria-hidden="true" />    

  </div>

  <nav class="navbar-down">
    <div class="nav-logo-down">Created by 🆉. Sūn</div>
      <div class="nav-links-down">
      </div>
    </nav>
  
  <script type="text/javascript" src="script.js"></script>

</body>
</html>
